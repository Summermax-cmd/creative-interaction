<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Invisible Cloth · 透明物理幕布</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; touch-action: none;
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    overscroll-behavior: none;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  canvas { display: block; }
  #start-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; z-index: 1000; padding: 24px;
  }
  #start-overlay h1 {
    font-size: 26px; font-weight: 200; letter-spacing: 6px; margin-bottom: 8px;
  }
  #start-overlay h2 {
    font-size: 13px; font-weight: 300; letter-spacing: 4px; opacity: 0.5; margin-bottom: 36px;
  }
  #start-overlay p {
    font-size: 13px; opacity: 0.65; max-width: 380px;
    text-align: center; line-height: 1.7; margin-bottom: 36px;
  }
  #start-btn {
    padding: 14px 44px; border: 1px solid #fff; background: transparent;
    color: #fff; font-size: 12px; letter-spacing: 4px; cursor: pointer;
    transition: all 0.3s; font-family: inherit;
  }
  #start-btn:hover, #start-btn:active { background: #fff; color: #000; }
  #start-btn:disabled { opacity: 0.4; cursor: wait; }
  .err { color: #f99; font-size: 12px; margin-top: 16px; min-height: 16px; }

  .ui-panel { position: fixed; z-index: 100; transition: opacity 0.3s; }
  #controls-br {
    bottom: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
  }
  #controls-tr { top: 16px; right: 16px; }
  .ctrl-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(0,0,0,0.45); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-family: inherit;
  }
  .ctrl-btn:hover, .ctrl-btn:active { background: rgba(255,255,255,0.18); }
  .scale-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.45); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border-radius: 22px; padding: 9px 14px;
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff; font-size: 11px; letter-spacing: 1.5px;
  }
  #scale-slider {
    width: 100px; -webkit-appearance: none; appearance: none;
    background: transparent; height: 4px;
  }
  #scale-slider::-webkit-slider-runnable-track {
    height: 2px; background: rgba(255,255,255,0.3); border-radius: 1px;
  }
  #scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; margin-top: -5px; cursor: pointer;
  }
  #scale-slider::-moz-range-track { height: 2px; background: rgba(255,255,255,0.3); }
  #scale-slider::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: none; }
  .ui-hidden { opacity: 0; pointer-events: none; }
  #file-input { display: none; }
  #status {
    position: fixed; top: 16px; left: 16px; z-index: 90;
    color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 1px;
    pointer-events: none;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="start-overlay">
  <h1>INVISIBLE CLOTH</h1>
  <h2>透明物理幕布</h2>
  <p>A camouflaged cloth hangs in front of the camera.<br>Pinch (thumb + index) in the air to grab it.<br>Lift quickly to reveal what hides behind.</p>
  <button id="start-btn">START</button>
  <div class="err" id="err"></div>
</div>
<div id="controls-br" class="ui-panel">
  <div class="scale-row">
    <span>SCALE</span>
    <input type="range" id="scale-slider" min="0.5" max="1.8" step="0.01" value="1">
  </div>
  <button class="ctrl-btn" id="upload-btn" title="Upload media">↥</button>
  <button class="ctrl-btn" id="flip-btn" title="Flip camera">⇄</button>
</div>
<div id="controls-tr" class="ui-panel">
  <button class="ctrl-btn" id="eye-btn" title="Toggle UI">◉</button>
</div>
<input type="file" id="file-input" accept="image/*,video/*">
<div id="status"></div>

<script>
// ---------- CONFIG ----------
const COLS = 38, ROWS = 35;
const FRICTION = 0.944, GRAVITY = 0.08;
const ITER = 12, STIFF = 0.4;
const PINCH_DOWN = 0.05, PINCH_UP = 0.08;
const GRAB_R = 150, HAND_MATCH_R = 200;
const FLY_VY = -15, DROP_VY = 15;
const FLY_RESTORE = 0.02, DROP_RESTORE = 0.0011;
const FLY_TARGET_Y = 85;

// ---------- STATE ----------
let videoEl = null;
let mpHands = null;
let cloth = null;
let mediaEl = null;
let mediaRatio = 16/9;
let scaleVal = 1;
let facingMode = 'user';
let started = false;
let liveHands = [];   // current
let prevHands = [];   // last frame
let virtualHand = null; // mouse / touch fallback
let camStream = null;
let handsReady = false;

// ---------- POINT / STICK / CLOTH ----------
class Point {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.px = x; this.py = y;
    this.ix = x; this.iy = y;
    this.pinned = false;
    this.ox = (Math.random() * 40) - 20;
    this.oy = (Math.random() * 40) - 35;
    this.flying = false;
    this.dropping = false;
    this.flyTargetY = 0;
    this._gOffX = 0; this._gOffY = 0;
  }
  update(noiseFn, frame) {
    if (this.pinned) { this.px = this.x; this.py = this.y; return; }
    const vx = (this.x - this.px) * FRICTION;
    const vy = (this.y - this.py) * FRICTION;
    this.px = this.x; this.py = this.y;
    this.x += vx;
    this.y += vy + GRAVITY;
    // perlin wind
    const n = noiseFn(this.x * 0.005, this.y * 0.005, frame * 0.01);
    this.x += (n - 0.5) * 0.35;
    // restore states
    if (this.flying) {
      this.y += (this.flyTargetY - this.y) * FLY_RESTORE;
    } else if (this.dropping) {
      this.x += (this.ix - this.x) * DROP_RESTORE;
      this.y += (this.iy - this.y) * DROP_RESTORE;
    }
  }
}
class Stick {
  constructor(a, b) {
    this.a = a; this.b = b;
    const dx = a.x - b.x, dy = a.y - b.y;
    this.len = Math.sqrt(dx*dx + dy*dy);
  }
  resolve() {
    const dx = this.b.x - this.a.x, dy = this.b.y - this.a.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d === 0) return;
    const diff = (this.len - d) / d * STIFF;
    const ox = dx * diff * 0.5, oy = dy * diff * 0.5;
    if (!this.a.pinned) { this.a.x -= ox; this.a.y -= oy; }
    if (!this.b.pinned) { this.b.x += ox; this.b.y += oy; }
  }
}
class Cloth {
  constructor() {
    this.cols = COLS; this.rows = ROWS;
    this.computeBounds();
    this.build();
  }
  computeBounds() {
    const maxW = width * 0.85, maxH = height * 0.55;
    let w, h;
    if (maxW / mediaRatio <= maxH) { w = maxW; h = maxW / mediaRatio; }
    else { h = maxH; w = maxH * mediaRatio; }
    this.w = w; this.h = h;
    this.x0 = (width - w) / 2;
    this.y0 = height * 0.08;
  }
  build() {
    this.points = []; this.sticks = []; this.origAreas = [];
    const dx = this.w / (this.cols - 1), dy = this.h / (this.rows - 1);
    for (let j = 0; j < this.rows; j++) {
      for (let i = 0; i < this.cols; i++) {
        const x = this.x0 + i * dx, y = this.y0 + j * dy;
        const p = new Point(x, y);
        if (j === 0) p.pinned = true;
        this.points.push(p);
      }
    }
    for (let j = 0; j < this.rows; j++) {
      for (let i = 0; i < this.cols; i++) {
        const p = this.pt(i, j);
        if (i < this.cols - 1) this.sticks.push(new Stick(p, this.pt(i+1, j)));
        if (j < this.rows - 1) this.sticks.push(new Stick(p, this.pt(i, j+1)));
      }
    }
    for (let j = 0; j < this.rows - 1; j++) {
      for (let i = 0; i < this.cols - 1; i++) {
        this.origAreas.push(this.quadArea(i, j));
      }
    }
  }
  pt(i, j) { return this.points[j * this.cols + i]; }
  quadArea(i, j) {
    const a = this.pt(i, j), b = this.pt(i+1, j), c = this.pt(i+1, j+1), d = this.pt(i, j+1);
    return Math.abs((a.x*b.y - b.x*a.y + b.x*c.y - c.x*b.y + c.x*d.y - d.x*c.y + d.x*a.y - a.x*d.y) * 0.5);
  }
  update() {
    for (const p of this.points) p.update(noise, frameCount);
    for (let k = 0; k < ITER; k++) {
      for (const s of this.sticks) s.resolve();
      for (const h of allHands()) {
        if (!h.grabbed) continue;
        for (const idx of h.grabbedPoints) {
          const p = this.points[idx];
          if (!p.pinned) {
            p.x = h.x + p._gOffX;
            p.y = h.y + p._gOffY;
          }
        }
      }
    }
  }
}

// ---------- HANDS ----------
function allHands() {
  return virtualHand ? liveHands.concat([virtualHand]) : liveHands;
}

function processHandFrame(rawHands) {
  // build new hand objects
  const fresh = rawHands.map(h => ({
    x: h.x, y: h.y, pinchDist: h.pinchDist,
    pinch: false, grabbed: false, grabbedPoints: [],
    vx: 0, vy: 0
  }));
  // match each fresh hand to closest previous (within HAND_MATCH_R)
  const used = new Set();
  for (const h of fresh) {
    let best = -1, bestD = HAND_MATCH_R;
    for (let i = 0; i < prevHands.length; i++) {
      if (used.has(i)) continue;
      const dx = h.x - prevHands[i].x, dy = h.y - prevHands[i].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < bestD) { bestD = d; best = i; }
    }
    if (best >= 0) {
      used.add(best);
      const prev = prevHands[best];
      h.pinch = prev.pinch;
      h.grabbed = prev.grabbed;
      h.grabbedPoints = prev.grabbedPoints;
      h.vx = h.x - prev.x; h.vy = h.y - prev.y;
    }
    // hysteresis
    if (h.pinch) { if (h.pinchDist > PINCH_UP) h.pinch = false; }
    else { if (h.pinchDist < PINCH_DOWN) h.pinch = true; }
    // grab transition
    handleGrabTransition(h);
  }
  prevHands = fresh;
  liveHands = fresh;
}

function handleGrabTransition(h) {
  if (h.pinch && !h.grabbed) {
    h.grabbed = true;
    h.grabbedPoints = [];
    for (let i = 0; i < cloth.points.length; i++) {
      const p = cloth.points[i];
      if (p.pinned) continue;
      const dx = h.x - p.x, dy = h.y - p.y;
      if (dx*dx + dy*dy < GRAB_R * GRAB_R) {
        h.grabbedPoints.push(i);
        p._gOffX = p.x - h.x;
        p._gOffY = p.y - h.y;
        p.flying = false;
        p.dropping = false;
      }
    }
  } else if (!h.pinch && h.grabbed) {
    const vy = h.vy || 0;
    for (const idx of h.grabbedPoints) {
      const p = cloth.points[idx];
      if (vy < FLY_VY) {
        p.flying = true;
        p.dropping = false;
        p.flyTargetY = FLY_TARGET_Y + (Math.random() * 60 - 30);
      } else {
        p.flying = false;
        p.dropping = true;
      }
    }
    h.grabbed = false;
    h.grabbedPoints = [];
  }
}

// ---------- MEDIAPIPE ----------
function initHands() {
  if (typeof Hands === 'undefined') return;
  mpHands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  mpHands.setOptions({
    maxNumHands: 2, modelComplexity: 0,
    minDetectionConfidence: 0.6, minTrackingConfidence: 0.5
  });
  mpHands.onResults(onHandsResults);
  handsReady = true;
  pumpHands();
}

let pumping = false;
async function pumpHands() {
  if (pumping) return;
  pumping = true;
  const loop = async () => {
    if (!started || !videoEl || videoEl.readyState < 2) {
      requestAnimationFrame(loop); return;
    }
    try { await mpHands.send({ image: videoEl }); } catch(e) {}
    requestAnimationFrame(loop);
  };
  loop();
}

function onHandsResults(results) {
  const out = [];
  if (results.multiHandLandmarks) {
    for (const lms of results.multiHandLandmarks) {
      const thumb = lms[4], index = lms[8];
      const mx = (thumb.x + index.x) * 0.5;
      const my = (thumb.y + index.y) * 0.5;
      // mirror x
      const cx = (1 - mx) * width;
      const cy = my * height;
      const dxn = thumb.x - index.x, dyn = thumb.y - index.y;
      const pinchDist = Math.sqrt(dxn*dxn + dyn*dyn);
      out.push({ x: cx, y: cy, pinchDist });
    }
  }
  processHandFrame(out);
}

// ---------- CAMERA ----------
async function initCamera() {
  try {
    if (camStream) camStream.getTracks().forEach(t => t.stop());
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    if (!videoEl) {
      videoEl = document.createElement('video');
      videoEl.autoplay = true;
      videoEl.playsInline = true;
      videoEl.muted = true;
      videoEl.style.display = 'none';
      document.body.appendChild(videoEl);
    }
    videoEl.srcObject = camStream;
    await videoEl.play();
    return true;
  } catch (e) {
    document.getElementById('err').textContent = 'Camera access denied. Mouse fallback only.';
    return false;
  }
}

// ---------- P5 ----------
function setup() {
  const c = createCanvas(windowWidth, windowHeight);
  c.parent(document.body);
  pixelDensity(1);
  cloth = new Cloth();
  setupUI();
  noLoop(); // start triggers loop
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cloth = new Cloth();
}

function draw() {
  if (!started) { background(0); return; }
  const ctx = drawingContext;

  // ----- LAYER 1: full camera -----
  background(15);
  if (videoEl && videoEl.readyState >= 2) {
    ctx.save();
    ctx.translate(width, 0); ctx.scale(-1, 1);
    ctx.drawImage(videoEl, 0, 0, width, height);
    ctx.restore();
  }

  // physics
  cloth.update();

  // ----- LAYER 2: media at cloth initial bounds -----
  drawMedia(ctx);

  // build perimeter once
  const perim = collectPerimeter();

  // ----- LAYER 3: clip to cloth, redraw camera + shading -----
  ctx.save();
  pathPerimeter(ctx, perim);
  ctx.clip();
  if (videoEl && videoEl.readyState >= 2) {
    ctx.save();
    ctx.translate(width, 0); ctx.scale(-1, 1);
    ctx.drawImage(videoEl, 0, 0, width, height);
    ctx.restore();
  } else {
    ctx.fillStyle = '#0c0c0c'; ctx.fillRect(0, 0, width, height);
  }
  drawShading(ctx);
  ctx.restore();

  // edges (outside clip so glow shows)
  drawEdges(ctx, perim);

  // hand indicators
  drawHandIndicators(ctx);
}

function drawMedia(ctx) {
  const cw = cloth.w, ch = cloth.h, cx = cloth.x0, cy = cloth.y0;
  if (!mediaEl) {
    ctx.fillStyle = '#222';
    ctx.fillRect(cx, cy, cw, ch);
    ctx.fillStyle = 'rgba(180,180,180,0.55)';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Upload an image or video — it hides behind the cloth', cx + cw/2, cy + ch/2);
    return;
  }
  const s = scaleVal;
  const dw = cw * s, dh = ch * s;
  const dx = cx + (cw - dw) / 2, dy = cy + (ch - dh) / 2;
  ctx.save();
  ctx.beginPath();
  ctx.rect(cx, cy, cw, ch);
  ctx.clip();
  try { ctx.drawImage(mediaEl, dx, dy, dw, dh); } catch(e) {}
  ctx.restore();
}

function collectPerimeter() {
  const pts = [];
  for (let i = 0; i < COLS; i++) pts.push(cloth.pt(i, 0));
  for (let j = 1; j < ROWS; j++) pts.push(cloth.pt(COLS-1, j));
  for (let i = COLS-2; i >= 0; i--) pts.push(cloth.pt(i, ROWS-1));
  for (let j = ROWS-2; j > 0; j--) pts.push(cloth.pt(0, j));
  return pts;
}

function pathPerimeter(ctx, pts) {
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    if (i === 0) ctx.moveTo(p.x + p.ox, p.y + p.oy);
    else ctx.lineTo(p.x + p.ox, p.y + p.oy);
  }
  ctx.closePath();
}

function drawShading(ctx) {
  for (let j = 0; j < ROWS - 1; j++) {
    for (let i = 0; i < COLS - 1; i++) {
      const idx = j * (COLS - 1) + i;
      const cur = cloth.quadArea(i, j);
      const orig = cloth.origAreas[idx];
      if (orig === 0) continue;
      const r = cur / orig;
      let fill = null;
      if (r < 0.98) {
        const a = Math.min(120, (1 - r) * 240) / 255;
        fill = `rgba(0,0,0,${a.toFixed(3)})`;
      } else if (r > 1.02) {
        const a = Math.min(60, (r - 1) * 90) / 255;
        fill = `rgba(255,255,255,${a.toFixed(3)})`;
      }
      if (!fill) continue;
      const a = cloth.pt(i, j), b = cloth.pt(i+1, j),
            c = cloth.pt(i+1, j+1), d = cloth.pt(i, j+1);
      ctx.beginPath();
      ctx.moveTo(a.x + a.ox, a.y + a.oy);
      ctx.lineTo(b.x + b.ox, b.y + b.oy);
      ctx.lineTo(c.x + c.ox, c.y + c.oy);
      ctx.lineTo(d.x + d.ox, d.y + d.oy);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
    }
  }
}

function drawEdges(ctx, pts) {
  // smooth via Catmull-Rom
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  // inner black
  ctx.beginPath();
  catmullClosed(ctx, pts);
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 4;
  ctx.stroke();
  // outer white with glow
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  catmullClosed(ctx, pts);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function catmullClosed(ctx, pts) {
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i - 1 + n) % n];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % n];
    const p3 = pts[(i + 2) % n];
    const x0 = p0.x + p0.ox, y0 = p0.y + p0.oy;
    const x1 = p1.x + p1.ox, y1 = p1.y + p1.oy;
    const x2 = p2.x + p2.ox, y2 = p2.y + p2.oy;
    const x3 = p3.x + p3.ox, y3 = p3.y + p3.oy;
    if (i === 0) ctx.moveTo(x1, y1);
    const cp1x = x1 + (x2 - x0) / 6;
    const cp1y = y1 + (y2 - y0) / 6;
    const cp2x = x2 - (x3 - x1) / 6;
    const cp2y = y2 - (y3 - y1) / 6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
  }
}

function drawHandIndicators(ctx) {
  for (const h of allHands()) {
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.pinch ? 9 : 14, 0, Math.PI * 2);
    ctx.strokeStyle = h.pinch ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.45)';
    ctx.lineWidth = h.pinch ? 2 : 1;
    ctx.stroke();
    if (h.pinch) {
      ctx.beginPath();
      ctx.arc(h.x, h.y, 2.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
    }
  }
}

// ---------- UI ----------
function setupUI() {
  const startBtn = document.getElementById('start-btn');
  const errEl = document.getElementById('err');
  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    startBtn.textContent = 'STARTING...';
    errEl.textContent = '';
    const ok = await initCamera();
    initHands();
    document.getElementById('start-overlay').style.display = 'none';
    started = true;
    loop();
  });

  const fileInput = document.getElementById('file-input');
  document.getElementById('upload-btn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    loadMediaFile(f);
    fileInput.value = '';
  });

  document.getElementById('flip-btn').addEventListener('click', async () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    await initCamera();
  });

  document.getElementById('eye-btn').addEventListener('click', () => {
    document.querySelectorAll('.ui-panel').forEach(el => el.classList.toggle('ui-hidden'));
    // keep eye button visible
    document.getElementById('controls-tr').classList.remove('ui-hidden');
  });

  const slider = document.getElementById('scale-slider');
  slider.addEventListener('input', (e) => { scaleVal = parseFloat(e.target.value); });

  // mouse / touch fallback
  const onDown = (x, y) => {
    if (!started) return;
    virtualHand = { x, y, pinch: true, grabbed: false, grabbedPoints: [], vx: 0, vy: 0, _prevX: x, _prevY: y };
    handleGrabTransition(virtualHand);
  };
  const onMove = (x, y) => {
    if (!virtualHand) return;
    virtualHand.vx = x - virtualHand.x;
    virtualHand.vy = y - virtualHand.y;
    virtualHand.x = x; virtualHand.y = y;
  };
  const onUp = () => {
    if (!virtualHand) return;
    virtualHand.pinch = false;
    handleGrabTransition(virtualHand);
    virtualHand = null;
  };

  window.addEventListener('mousedown', e => { if (e.target.tagName === 'CANVAS') onDown(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchstart', e => {
    if (e.target.tagName === 'CANVAS' && e.touches[0]) {
      onDown(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (e.touches[0]) onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  window.addEventListener('touchend', onUp, { passive: true });
  // prevent pinch zoom
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
}

function loadMediaFile(f) {
  const url = URL.createObjectURL(f);
  if (f.type.startsWith('video/')) {
    const v = document.createElement('video');
    v.src = url; v.loop = true; v.muted = true; v.autoplay = true; v.playsInline = true;
    v.addEventListener('loadedmetadata', () => {
      mediaRatio = v.videoWidth / v.videoHeight || 16/9;
      mediaEl = v;
      cloth.computeBounds(); cloth.build();
      v.play().catch(()=>{});
    });
  } else {
    const img = new Image();
    img.onload = () => {
      mediaRatio = img.naturalWidth / img.naturalHeight || 1;
      mediaEl = img;
      cloth.computeBounds(); cloth.build();
    };
    img.src = url;
  }
}
</script>
